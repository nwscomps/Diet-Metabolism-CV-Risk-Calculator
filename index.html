<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Modello Dieta–Metabolismo–Rischio CV</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 25px;
}

.panel {
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ddd;
    padding: 5px;
    font-size: 12px;
}

canvas { margin-bottom: 25px; }
</style>
</head>

<body>

<h2>Modello Dieta–Metabolismo–Rischio CV (Carbohydrate Exposure Model)</h2>

<div class="container">

<div class="panel">

<h3>Input</h3>

<select id="diet">
<option>Mediterranea</option>
<option>Occidentale</option>
<option>Mediterranea low-fat</option>
<option>Cheto moderata</option>
<option>Cheto stretta</option>
</select>

<br><br>

<select id="comp">
<option>Animale</option>
<option>Mista</option>
<option>Vegetale</option>
</select>

<br><br>

Consistenza <input id="cons" type="number" value="0.8" step="0.1"><br><br>
Surplus <input id="surp" type="number" value="0.0" step="0.05"><br><br>
Attività <input id="act" type="number" value="0.3" step="0.1"><br><br>

BMI iniziale:
<select id="bmi0">
<option value="20">Atletico</option>
<option value="23" selected>Normopeso</option>
<option value="27">Sovrappeso</option>
<option value="33">Obeso</option>
</select>

<br><br>

<button onclick="run()">Simula</button>

</div>

<div class="panel">

<canvas id="chartBMI"></canvas>
<canvas id="chartTG"></canvas>
<canvas id="chartHDL"></canvas>
<canvas id="chartRISK"></canvas>

<div id="table"></div>

</div>

</div>

<script>

const dietMap = {
"Mediterranea":[0.55,1.00],
"Occidentale":[0.75,1.08],
"Mediterranea low-fat":[0.65,0.95],
"Cheto moderata":[0.25,1.00],
"Cheto stretta":[0.15,0.98]
};

const compMap = {
"Animale":[-0.15,0.05],
"Mista":[0,0],
"Vegetale":[0.2,-0.05]
};

function ema(prev, val, a){
    return a * val + (1 - a) * prev;
}

function run(){

let diet = document.getElementById("diet").value;
let comp = document.getElementById("comp").value;

let R = dietMap[diet][0] + compMap[comp][0];
let Cal = dietMap[diet][1] + compMap[comp][1];

let BMI = +document.getElementById("bmi0").value;

// STATES
let IR = 0.2;
let V = 1;
let TG = 120;
let HDL = 50;
let HDL0 = 50;
let Risk = 0;

// NEW: carbohydrate exposure memory
let CarbExp = R;
let GlyLoad = 0;

let bmiArr=[], tgArr=[], hdlArr=[], riskArr=[];

let rows="";

for(let t=0;t<24;t++){

// =======================
// CARB EXPOSURE (MEMORY)
// =======================
CarbExp = 0.9 * CarbExp + 0.1 * R;

// =======================
// POSTPRANDIAL GLUCOSE
// =======================

let G = 90 + 80 * CarbExp;

// =======================
// CHRONIC GLYCEMIC LOAD
// =======================

const G0 = 120;

let excess = Math.max(0, G - G0);
let deficit = Math.max(0, G0 - G);

GlyLoad =
GlyLoad
+ 0.005 * excess
- 0.002 * deficit;

GlyLoad = Math.max(0, GlyLoad);

// =======================
// INSULIN RESISTANCE
// =======================

IR =
0.20
+ 0.015 * BMI * GlyLoad
+ 0.010 * V
- 0.015 * document.getElementById("act").value;

IR = Math.max(0.05, IR);

// =======================
// VLDL
// =======================
V =
V
+ 0.055 * CarbExp * (1 + IR)
- 0.025 * V;

// =======================
// TRIGLYCERIDES
// =======================
TG =
TG
+ 0.045 * V
- 0.030 * TG;

// =======================
// HDL (balanced lipid + metabolic model)
// =======================
let HDL_target =
    HDL
    + 0.15
    + 1.0 * (1 / (1 + IR))
    + 0.6 * CarbExp
    - 0.05 * V
    - 0.02 * (HDL - HDL0);

HDL = HDL + 0.28 * (HDL_target - HDL);

// =======================
// BMI
// =======================
BMI = BMI + 0.035 * (Cal - 1);

// =======================
// RISK
// =======================
Risk = 0.97 * Risk + 0.05 * IR + 0.03 * (TG/HDL);

// STORE
bmiArr.push(BMI);
tgArr.push(TG);
hdlArr.push(HDL);
riskArr.push(Risk);

rows += `<tr>
<td>${t+1}</td>
<td>${BMI.toFixed(2)}</td>
<td>${TG.toFixed(0)}</td>
<td>${HDL.toFixed(1)}</td>
<td>${(TG/HDL).toFixed(2)}</td>
<td>${Risk.toFixed(2)}</td>
</tr>`;
}

// TABLE
document.getElementById("table").innerHTML =
`<table>
<tr><th>Mese</th><th>BMI</th><th>TG</th><th>HDL</th><th>TG/HDL</th><th>Risk</th></tr>
${rows}
</table>`;

// CHARTS
new Chart(document.getElementById("chartBMI"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"BMI",data:bmiArr}]}
});

new Chart(document.getElementById("chartTG"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"TG",data:tgArr}]}
});

new Chart(document.getElementById("chartHDL"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"HDL",data:hdlArr}]}
});

new Chart(document.getElementById("chartRISK"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"Risk",data:riskArr}]}
});

}

</script>

</body>
</html>
