<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Modello Dieta–Metabolismo–Rischio CV</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
}

.panel {
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
}

.green { background: #e8f5e9; padding:10px; border-radius:8px; }
.yellow { background: #fff8e1; padding:10px; border-radius:8px; }
.red { background: #ffebee; padding:10px; border-radius:8px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ddd;
    padding: 5px;
    font-size: 12px;
}
</style>
</head>

<body>

<h2>Modello Dinamico Dieta–Metabolismo–Rischio CV</h2>

<div class="container">

<!-- INPUT -->
<div class="panel">

<h3>Input</h3>

<select id="diet">
<option>Mediterranea</option>
<option>Occidentale</option>
<option>Mediterranea low-fat</option>
<option>Cheto moderata</option>
<option>Cheto stretta</option>
</select>

<br><br>

<select id="comp">
<option>Animale</option>
<option>Mista</option>
<option>Vegetale</option>
</select>

<br><br>

Consistenza <input id="cons" type="number" value="0.8" step="0.1"><br><br>
Surplus <input id="surp" type="number" value="0.0" step="0.05"><br><br>
Attività (ACT) <input id="act" type="number" value="0.3" step="0.1"><br><br>
Zuccheri <input id="sug" type="number" value="0.2" step="0.1"><br><br>
Alcol <input id="alc" type="number" value="0.1" step="0.1"><br><br>

BMI iniziale:
<select id="bmi0">
<option value="20">Atletico</option>
<option value="23" selected>Normopeso</option>
<option value="27">Sovrappeso</option>
<option value="33">Obeso</option>
</select>

<br><br>

<button onclick="run()">Simula</button>

</div>

<!-- OUTPUT -->
<div class="panel">

<canvas id="chartBMI"></canvas>
<canvas id="chartMet"></canvas>
<canvas id="chartRisk"></canvas>
<canvas id="chartTG"></canvas>

<div id="table"></div>
<div id="interpretBox"></div>

</div>

</div>

<script>

const dietMap = {
"Mediterranea":[0.5,1.02],
"Occidentale":[0.6,1.10],
"Mediterranea low-fat":[0.65,1.00],
"Cheto moderata":[0.25,1.02],
"Cheto stretta":[0.15,0.98]
};

const compMap = {
"Animale":[-0.2,0.05],
"Mista":[0,0],
"Vegetale":[0.25,-0.05]
};

function run(){

let diet = document.getElementById("diet").value;
let comp = document.getElementById("comp").value;

let R = dietMap[diet][0] + compMap[comp][0];
let Cal = dietMap[diet][1] + compMap[comp][1];

let CONS = +document.getElementById("cons").value;
let SURP = +document.getElementById("surp").value;
let ACT = +document.getElementById("act").value;
let SUG = +document.getElementById("sug").value;
let ALC = +document.getElementById("alc").value;

let BMI = +document.getElementById("bmi0").value;

// stati iniziali
let IR = 0.2, V = 1, TG = 1, HDL = 1.2, C = 0, Risk = 0;

let prev_IIML_effect = 1;
let IIML_baseline = null;

// arrays
let bmiArr=[], tgArr=[], hdlArr=[], iimlArr=[], riskArr=[], metArr=[];

let rows="";

for(let t=0;t<24;t++){

let noise = (1-CONS)*0.05*Math.random();

let R_t = R + 0.08*SUG + noise;
let Cal_t = Cal + SURP - 0.12*ACT + 0.03*ALC;

// stabilizzazione IR (soft saturation)
IR += 0.02*BMI*R_t*(1 - IR) - 0.01*IR;

// VLDL con saturazione minima
V  += 0.05*R_t*(1+IR)/(1+0.5*V) - 0.03*V;

TG += 0.04*V - 0.02*TG;
HDL+= 0.01 - 0.03*V - 0.01*(HDL-1);

// BMI
BMI += 0.1*(Cal_t-1)/(1+C);

// compensazione
C   += 0.01*(1/(1+(HDL/(TG+0.1)))) - 0.005*C;


// INDICI
let TGHDL = TG/(HDL+0.1);
let IIML = HDL / ((TG+0.1)*(1+0.3*V));

// baseline iniziale
if(IIML_baseline === null) IIML_baseline = IIML;

// trasformazione stabile
let IIML_raw = 1 / IIML;
let IIML_effect = 0.10 * IIML_raw + 0.90 * prev_IIML_effect;

// deviazione centrata
let IIML_dev = (IIML_effect / IIML_baseline) - 1;

// RISK stabilizzato
Risk = 0.985 * Risk + 0.18 * IIML_dev + 0.06 * (BMI - 23);

// memoria
prev_IIML_effect = IIML_effect;


// OUTPUT ARRAYS
bmiArr.push(BMI);
tgArr.push(TG);
hdlArr.push(HDL);
iimlArr.push(IIML);
riskArr.push(Risk);
metArr.push(TGHDL);

// TABLE
rows += `<tr>
<td>${t+1}</td>
<td>${BMI.toFixed(2)}</td>
<td>${TGHDL.toFixed(2)}</td>
<td>${IIML.toFixed(3)}</td>
<td>${(Risk*100).toFixed(1)}</td>
</tr>`;
}

// TABLE OUTPUT
document.getElementById("table").innerHTML =
`<table>
<tr><th>Mese</th><th>BMI</th><th>TG/HDL</th><th>IIML</th><th>Risk</th></tr>
${rows}
</table>`;

// CHARTS
new Chart(document.getElementById("chartBMI"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"BMI",data:bmiArr}]}
});

new Chart(document.getElementById("chartMet"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[
{label:"TG/HDL",data:metArr},
{label:"IIML",data:iimlArr}
]}
});

new Chart(document.getElementById("chartRisk"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"Risk (normalizzato)",data:riskArr}]}
});

new Chart(document.getElementById("chartTG"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"TG",data:tgArr},{label:"HDL",data:hdlArr}]}
});


// INTERPRETAZIONE
let finalRisk = riskArr[riskArr.length-1] * 100;
let box = document.getElementById("interpretBox");

if(finalRisk < 25){
box.className="green";
box.innerHTML="<b>Scenario favorevole</b><br>Profilo metabolico stabile.";
}
else if(finalRisk < 50){
box.className="yellow";
box.innerHTML="<b>Scenario intermedio</b><br>Progressivo stress metabolico.";
}
else{
box.className="red";
box.innerHTML="<b>Scenario critico</b><br>Accumulo significativo di rischio metabolico.";
}

}
</script>

<br>

<div style="margin-top:20px; font-size:12px; color:#555; border-top:1px solid #ccc; padding-top:10px;">
<b>Disclaimer</b><br>
Modello teorico-simulativo a scopo educativo.<br>
Non è valido per uso clinico o diagnostico.
</div>

</body>
</html>
