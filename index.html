<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Modello Dieta–Metabolismo–CSI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #fafafa;
}

h2 { margin-bottom: 20px; }

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
}

.panel {
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background: white;
}

.green { background: #e8f5e9; padding:10px; border-radius:8px; }
.yellow { background: #fff8e1; padding:10px; border-radius:8px; }
.red { background: #ffebee; padding:10px; border-radius:8px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 12px;
}

td, th {
    border: 1px solid #ddd;
    padding: 5px;
}

canvas {
    margin-bottom: 60px; /* 👈 DISTANZA TRA GRAFICI */
}
</style>
</head>

<body>

<h2>Modello Dinamico Dieta–Metabolismo–CSI</h2>

<div class="container">

<!-- INPUT -->
<div class="panel">

<h3>Input</h3>

<select id="diet">
<option>Mediterranea</option>
<option>Occidentale</option>
<option>Mediterranea low-fat</option>
<option>Cheto moderata</option>
<option>Cheto stretta</option>
</select>

<br><br>

<select id="comp">
<option>Animale</option>
<option>Mista</option>
<option>Vegetale</option>
</select>

<br><br>

Consistenza <input id="cons" type="number" value="0.8" step="0.1"><br><br>
Surplus <input id="surp" type="number" value="0.0" step="0.05"><br><br>
Attività <input id="act" type="number" value="0.4" step="0.1"><br><br>
Zuccheri <input id="sug" type="number" value="0.2" step="0.1"><br><br>
Alcol <input id="alc" type="number" value="0.1" step="0.1"><br><br>

BMI iniziale:
<select id="bmi0">
<option value="20">Atletico</option>
<option value="23" selected>Normopeso</option>
<option value="27">Sovrappeso</option>
<option value="33">Obeso</option>
</select>

<br><br>

<button onclick="run()">Simula</button>

</div>

<!-- OUTPUT -->
<div class="panel">

<canvas id="chartBMI"></canvas>
<canvas id="chartLipid"></canvas>
<canvas id="chartIIML"></canvas>
<canvas id="chartRisk"></canvas>

<div id="table"></div>
<br>
<div id="interpretBox"></div>

</div>

</div>

<script>

const dietMap = {
"Mediterranea":[0.5,1.02],
"Occidentale":[0.6,1.10],
"Mediterranea low-fat":[0.65,1.00],
"Cheto moderata":[0.25,1.02],
"Cheto stretta":[0.15,0.98]
};

const compMap = {
"Animale":[-0.2,0.05],
"Mista":[0,0],
"Vegetale":[0.25,-0.05]
};

// 👇 SOLO OUTPUT SCALING (non modello)
const TG_SCALE = 120;
const HDL_SCALE = 50;

function run(){

let diet = document.getElementById("diet").value;
let comp = document.getElementById("comp").value;

let R = dietMap[diet][0] + compMap[comp][0];
let Cal = dietMap[diet][1] + compMap[comp][1];

let CONS = +document.getElementById("cons").value;
let SURP = +document.getElementById("surp").value;
let ACT = +document.getElementById("act").value;
let SUG = +document.getElementById("sug").value;
let ALC = +document.getElementById("alc").value;

let BMI = +document.getElementById("bmi0").value;

let IR=0.2, V=1, TG=1, HDL=1.2, C=0;
let Risk=0, prevIIML=1;

let bmiArr=[], tgArr=[], hdlArr=[], iimlArr=[], riskArr=[];

let rows="";

for(let t=0;t<24;t++){

let noise = (1-CONS)*0.05*Math.random();

let R_t = R + 0.08*SUG + noise;
let Cal_t = Cal + SURP - 0.12*ACT + 0.03*ALC;

// --- dinamica ---
IR += 0.02*BMI*R_t - 0.01*IR;

V  += 0.05*R_t*(1+IR) - 0.03*V;

TG += 0.04*V - 0.02*TG;
HDL+= 0.01 - 0.03*V - 0.01*(HDL-1);

BMI += 0.1*(Cal_t-1);

C   += 0.01*(1/(1+(HDL/(TG+0.1)))) - 0.005*C;

// --- INDICI ---
let TGHDL = TG/(HDL+0.1);
let IIML = HDL / ((TG+0.1)*(1+0.3*V));

// smoothing IIML effect
let IIML_effect = 0.05*(1/IIML) + 0.95*prevIIML;
prevIIML = IIML_effect;

// 🔥 CSI (ex Risk, ora stato)
Risk = 0.97*Risk + 0.3*(IIML_effect - 1) + 0.1*(BMI - 23);

// --- OUTPUT SCALED ---
let TG_ui = TG * TG_SCALE;
let HDL_ui = HDL * HDL_SCALE;

// --- arrays ---
bmiArr.push(BMI);
tgArr.push(TG_ui);
hdlArr.push(HDL_ui);
iimlArr.push(IIML);
riskArr.push(Risk);

rows += `<tr>
<td>${t+1}</td>
<td>${BMI.toFixed(2)}</td>
<td>${TG_ui.toFixed(0)}</td>
<td>${HDL_ui.toFixed(0)}</td>
<td>${IIML.toFixed(3)}</td>
<td>${Risk.toFixed(2)}</td>
</tr>`;
}

// TABLE
document.getElementById("table").innerHTML =
`<table>
<tr><th>Mese</th><th>BMI</th><th>TG (mg/dL)</th><th>HDL (mg/dL)</th><th>IIML</th><th>CSI</th></tr>
${rows}
</table>`;

// CHART COLORS (no duplicazioni monotone)
function mkChart(id, labels, datasets){
new Chart(document.getElementById(id),{
type:"line",
data:{labels,datasets},
options:{responsive:true}
});
}

let labels=[...Array(24).keys()].map(i=>"M"+(i+1));

// BMI
mkChart("chartBMI", labels, [
{label:"BMI", data:bmiArr, borderColor:"#1f77b4"}
]);

// Lipidi
mkChart("chartLipid", labels, [
{label:"TG", data:tgArr, borderColor:"#d62728"},
{label:"HDL", data:hdlArr, borderColor:"#2ca02c"}
]);

// IIML
mkChart("chartIIML", labels, [
{label:"IIML", data:iimlArr, borderColor:"#9467bd"}
]);

// CSI
mkChart("chartRisk", labels, [
{label:"CSI", data:riskArr, borderColor:"#ff7f0e"}
]);

// INTERPRETAZIONE
let finalRisk = riskArr[riskArr.length-1];
let box = document.getElementById("interpretBox");

if(finalRisk < -2){
box.className="green";
box.innerHTML="<b>Equilibrio metabolico</b><br>Stato fisiologico stabile.";
}
else if(finalRisk < 5){
box.className="yellow";
box.innerHTML="<b>Transizione metabolica</b><br>Lieve stress regolabile.";
}
else{
box.className="red";
box.innerHTML="<b>Stress metabolico</b><br>Assetto dismetabolico stabile.";
}

}

</script>

<br>

<div style="margin-top:20px; font-size:12px; color:#555; border-top:1px solid #ccc; padding-top:10px;">
<b>Disclaimer</b><br>
Modello teorico-simulativo non clinico.<br>
Non utilizzabile per diagnosi o decisioni mediche.
</div>

</body>
</html>
