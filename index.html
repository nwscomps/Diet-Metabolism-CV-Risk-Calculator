<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Modello Dieta–Metabolismo–Rischio CV</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
}

.panel {
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
}

canvas {
    margin-bottom: 25px;
}

.green { background:#e8f5e9; padding:10px; border-radius:8px; }
.yellow { background:#fff8e1; padding:10px; border-radius:8px; }
.red { background:#ffebee; padding:10px; border-radius:8px; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td, th {
    border:1px solid #ddd;
    padding:5px;
    font-size:12px;
}
</style>
</head>

<body>

<h2>Modello Dieta–Metabolismo–Rischio CV</h2>

<div class="container">

<!-- INPUT -->
<div class="panel">

<h3>Input</h3>

<select id="diet">
<option>Mediterranea</option>
<option>Occidentale</option>
<option>Mediterranea low-fat</option>
<option>Cheto moderata</option>
<option>Cheto stretta</option>
</select>

<br><br>

<select id="comp">
<option>Animale</option>
<option>Mista</option>
<option>Vegetale</option>
</select>

<br><br>

Consistenza <input id="cons" type="number" value="0.8" step="0.1"><br><br>
Surplus <input id="surp" type="number" value="0.0" step="0.05"><br><br>
Attività <input id="act" type="number" value="0.3" step="0.1"><br><br>
Zuccheri <input id="sug" type="number" value="0.2" step="0.1"><br><br>
Alcol <input id="alc" type="number" value="0.1" step="0.1"><br><br>

BMI iniziale:
<select id="bmi0">
<option value="20">Atletico</option>
<option value="23" selected>Normopeso</option>
<option value="27">Sovrappeso</option>
<option value="33">Obeso</option>
</select>

<br><br>

<button onclick="run()">Simula</button>
<button onclick="stressTest()">Stress Test</button>

</div>

<!-- OUTPUT -->
<div class="panel">

<canvas id="chartBMI"></canvas>
<canvas id="chartTGHDL"></canvas>
<canvas id="chartIIML"></canvas>
<canvas id="chartCSI"></canvas>

<div id="table"></div>
<div id="interpretBox"></div>

</div>

</div>

<script>

/* =========================
   MAPPE DIETA
========================= */

const dietMap = {
"Mediterranea":[0.5,1.02],
"Occidentale":[0.6,1.10],
"Mediterranea low-fat":[0.65,1.00],
"Cheto moderata":[0.25,1.02],
"Cheto stretta":[0.15,0.98]
};

const compMap = {
"Animale":[-0.2,0.05],
"Mista":[0,0],
"Vegetale":[0.25,-0.05]
};

/* =========================
   CHART HANDLES
========================= */

let charts = {};

/* =========================
   SIMULAZIONE PRINCIPALE
========================= */

function run(){

// reset UI
document.getElementById("table").innerHTML = "";
document.getElementById("interpretBox").className = "";
document.getElementById("interpretBox").innerHTML = "";

// reset charts
Object.values(charts).forEach(c => c.destroy());
charts = {};

// input
let diet = document.getElementById("diet").value;
let comp = document.getElementById("comp").value;

let R = dietMap[diet][0] + compMap[comp][0];
let Cal = dietMap[diet][1] + compMap[comp][1];

let CONS = +document.getElementById("cons").value;
let SURP = +document.getElementById("surp").value;
let ACT  = +document.getElementById("act").value;
let SUG  = +document.getElementById("sug").value;
let ALC  = +document.getElementById("alc").value;

let BMI = +document.getElementById("bmi0").value;

// stato
let IR=0.2, V=1, TG=1, HDL=1.2;
let CSI=0, prevIIML=1;

// serie
let bmiArr=[], tgArr=[], hdlArr=[], tgHdlArr=[], iimlArr=[], csiArr=[];

let rows="";

for(let t=0;t<24;t++){

let noise = (1-CONS)*0.05*Math.random();

let R_t = R + 0.08*SUG + noise;
let Cal_t = Cal + SURP - 0.12*ACT + 0.03*ALC;

/* ===== metabolico ===== */
IR += 0.02*BMI*R_t - 0.01*IR;
V  += 0.05*R_t*(1+IR) - 0.03*V;

/* ===== deviazione regime ===== */
let dR = R_t - 0.5;

/* ===== lipidi coerenti ===== */
TG  += 0.04*V - 0.02*TG + 0.03*dR;
HDL += 0.01 - 0.03*V - 0.01*(HDL-1) - 0.02*dR;

/* ===== struttura ===== */
BMI += 0.1*(Cal_t-1);
BMI = Math.max(18, BMI); // vincolo fisiologico

/* ===== indici ===== */
let TGHDL = TG/(HDL+0.1);
let IIML = HDL / ((TG+0.1)*(1+0.3*V));

let IIML_effect = 0.05*(1/IIML) + 0.95*prevIIML;
prevIIML = IIML_effect;

/* ===== CSI ===== */
CSI = 0.97*CSI + 0.3*(IIML_effect - 1) + 0.1*(BMI - 23);

/* ===== scaling display ===== */
let CSI_UI = 100*(1 - Math.exp(-0.03*CSI));

/* ===== store ===== */
bmiArr.push(BMI);
tgArr.push(TG);
hdlArr.push(HDL);
tgHdlArr.push(TGHDL);
iimlArr.push(IIML);
csiArr.push(CSI_UI);

rows += `<tr>
<td>${t+1}</td>
<td>${BMI.toFixed(2)}</td>
<td>${(TG*100).toFixed(0)}</td>
<td>${(HDL*100).toFixed(0)}</td>
<td>${IIML.toFixed(3)}</td>
<td>${CSI_UI.toFixed(1)}</td>
</tr>`;
}

/* ===== TABLE ===== */

document.getElementById("table").innerHTML = `
<table>
<tr>
<th>Mese</th><th>BMI</th><th>TG (mg/dL)</th><th>HDL (mg/dL)</th><th>IIML</th><th>CSI</th>
</tr>${rows}</table>`;

/* ===== CHARTS ===== */

charts.bmi = new Chart(document.getElementById("chartBMI"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"BMI",data:bmiArr}]}
});

charts.met = new Chart(document.getElementById("chartTGHDL"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[
{label:"TG/HDL",data:tgHdlArr},
{label:"TG",data:tgArr},
{label:"HDL",data:hdlArr}
]}
});

charts.iiml = new Chart(document.getElementById("chartIIML"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"IIML",data:iimlArr}]}
});

charts.csi = new Chart(document.getElementById("chartCSI"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"CSI",data:csiArr}]}
});

/* ===== INTERPRETAZIONE ===== */

let finalCSI = csiArr[csiArr.length-1];
let box = document.getElementById("interpretBox");

if(finalCSI < 20){
box.className="green";
box.innerHTML="Profilo stabile con bassa progressione dismetabolica.";
}
else if(finalCSI < 60){
box.className="yellow";
box.innerHTML="Progressivo spostamento verso assetto dismetabolico.";
}
else{
box.className="red";
box.innerHTML="Elevata attivazione del rischio cardiovascolare.";
}

}

/* =========================
   STRESS TEST
========================= */

function simulate(diet){

let R = dietMap[diet][0];
let Cal = dietMap[diet][1];

let BMI = 23;
let IR=0.2, V=1, TG=1, HDL=1.2;
let CSI=0, prevIIML=1;

for(let t=0;t<24;t++){

IR += 0.02*BMI*R;
V  += 0.05*R*(1+IR);

let dR = R - 0.5;

TG  += 0.04*V + 0.03*dR;
HDL += 0.01 - 0.03*V - 0.02*dR;

BMI += 0;

let IIML = HDL / ((TG+0.1)*(1+0.3*V));
let IIML_effect = 0.05*(1/IIML) + 0.95*prevIIML;
prevIIML = IIML_effect;

CSI = 0.97*CSI + 0.3*(IIML_effect - 1);
}

return CSI;
}

function stressTest(){

let diets = ["Mediterranea","Occidentale","Cheto moderata","Cheto stretta"];

let results = diets.map(d => ({
diet:d,
CSI:simulate(d)
}));

console.table(results);

alert("Stress test completato (vedi console)");
}

</script>

<br>

<div style="font-size:12px;color:#666;border-top:1px solid #ccc;padding-top:10px;">
<b>Disclaimer</b><br>
Modello teorico-simulativo non clinico. Non utilizzare per decisioni mediche.
</div>

</body>
</html>
