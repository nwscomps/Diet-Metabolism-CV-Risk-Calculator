<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Modello Dieta–Metabolismo–CV</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
}

.panel {
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ddd;
    padding: 4px;
    font-size: 12px;
}

canvas { margin-bottom: 20px; }
</style>
</head>

<body>

<h2>Modello Dieta–Metabolismo–Rischio CV</h2>

<div class="container">

<div class="panel">

<h3>Input</h3>

<select id="diet">
<option>Mediterranea</option>
<option>Occidentale</option>
<option>Mediterranea low-fat</option>
<option>Cheto moderata</option>
<option>Cheto stretta</option>
</select>

<br><br>

<select id="comp">
<option>Animale</option>
<option>Mista</option>
<option>Vegetale</option>
</select>

<br><br>

BMI iniziale:
<select id="bmi0">
<option value="20">Atletico</option>
<option value="23" selected>Normopeso</option>
<option value="27">Sovrappeso</option>
<option value="33">Obeso</option>
</select>

<br><br>

<button onclick="run()">Simula</button>

</div>

<div class="panel">

<canvas id="chartBMI"></canvas>
<canvas id="chartTG"></canvas>
<canvas id="chartHDL"></canvas>
<canvas id="chartRISK"></canvas>

<div id="table"></div>

</div>

</div>

<script>

// =====================
// MAPPE
// =====================

const dietMap = {
"Mediterranea":[0.55,1.00],
"Occidentale":[0.75,1.08],
"Mediterranea low-fat":[0.65,0.95],
"Cheto moderata":[0.25,1.00],
"Cheto stretta":[0.15,0.98]
};

const compMap = {
"Animale":[-0.15,0.05],
"Mista":[0,0],
"Vegetale":[0.2,-0.05]
};

// =====================
// CHART HANDLES
// =====================
let charts = [];

function clearCharts(){
    charts.forEach(c => c.destroy());
    charts = [];
}

function run(){

clearCharts();

let diet = document.getElementById("diet").value;
let comp = document.getElementById("comp").value;

let R = dietMap[diet][0] + compMap[comp][0];
let Cal = dietMap[diet][1] + compMap[comp][1];

// =====================
// PARAMETRI
// =====================

let months = 24;
let mealsPerMonth = 90;

let BMI = +document.getElementById("bmi0").value;
let IR = 0.2;
let V = 1;
let TG = 120;
let HDL = 50;
let HDL0 = 50;
let Risk = 0;

let rows = "";

let bmiArr=[], tgArr=[], hdlArr=[], riskArr=[];

// =====================
// LOOP MENSILE
// =====================

for(let m = 0; m < months; m++){

    let IR_signal = 0;

    // =====================
    // LOOP PASTI (solo IR)
    // =====================
    let G = 90;

    for(let t = 0; t < mealsPerMonth; t++){

        let CHO = R / (1 + R);
        let glucoseLoad = 600 * CHO;

        let G_target = 90 + 0.03 * glucoseLoad * (1 + 0.4 * IR);

        G = G + 0.45 * (G_target - G);

        let excess = Math.max(0, G - 120);
        let deficit = Math.max(0, 120 - G);

        IR_signal += 0.01 * excess - 0.005 * deficit;

        G = 90 + 0.3 * (G - 90);
    }

    // =====================
    // UPDATE IR
    // =====================
    IR += IR_signal + 0.01 * V - 0.02 * IR;
    IR = Math.max(0.05, Math.min(IR, 5));

    // =====================
    // VLDL
    // =====================
    V += 0.05 * R * (1 + IR) - 0.03 * V;
    V = Math.max(0.1, V);

    // =====================
    // TRIGLICERIDI
    // =====================
    TG += 0.04 * V - 0.03 * TG;
    TG = Math.max(20, TG);

    // =====================
    // HDL STABILE
    // =====================
    HDL += 0.2
        + 0.8 * (1 / (1 + IR))
        + 0.3 * R
        - 0.05 * V
        - 0.02 * (HDL - HDL0);

    HDL = Math.max(10, HDL);

    // =====================
    // BMI
    // =====================
    BMI += 0.035 * (Cal - 1);

    // =====================
    // RISK
    // =====================
    Risk = 0.95 * Risk + 0.03 * IR + 0.02 * (TG / HDL);

    // =====================
    // STORE
    // =====================
    bmiArr.push(BMI);
    tgArr.push(TG);
    hdlArr.push(HDL);
    riskArr.push(Risk);

    rows += `<tr>
        <td>${m+1}</td>
        <td>${BMI.toFixed(2)}</td>
        <td>${TG.toFixed(0)}</td>
        <td>${HDL.toFixed(1)}</td>
        <td>${(TG/HDL).toFixed(2)}</td>
        <td>${Risk.toFixed(2)}</td>
    </tr>`;
}

// =====================
// TABLE
// =====================
document.getElementById("table").innerHTML =
`<table>
<tr><th>Mese</th><th>BMI</th><th>TG</th><th>HDL</th><th>TG/HDL</th><th>Risk</th></tr>
${rows}
</table>`;

// =====================
// CHARTS
// =====================
function makeChart(id, label, data){
    let ctx = document.getElementById(id);

    let chart = new Chart(ctx,{
        type:"line",
        data:{
            labels:[...Array(months).keys()].map(i=>"M"+(i+1)),
            datasets:[{label, data}]
        }
    });

    charts.push(chart);
}

makeChart("chartBMI","BMI",bmiArr);
makeChart("chartTG","TG",tgArr);
makeChart("chartHDL","HDL",hdlArr);
makeChart("chartRISK","Risk",riskArr);

}

</script>

</body>
</html>
