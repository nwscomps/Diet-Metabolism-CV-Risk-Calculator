<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Modello Dieta–Metabolismo–Rischio CV</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 25px;
}

.panel {
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ddd;
    padding: 5px;
    font-size: 12px;
}

canvas { margin-bottom: 25px; }
</style>
</head>

<body>

<h2>Modello Dieta–Metabolismo–Rischio CV</h2>

<div class="container">

<div class="panel">

<h3>Input</h3>

<select id="diet">
<option>Mediterranea</option>
<option>Occidentale</option>
<option>Mediterranea low-fat</option>
<option>Cheto moderata</option>
<option>Cheto stretta</option>
</select>

<br><br>

<select id="comp">
<option>Animale</option>
<option>Mista</option>
<option>Vegetale</option>
</select>

<br><br>

Consistenza <input id="cons" type="number" value="0.8" step="0.1"><br><br>
Surplus <input id="surp" type="number" value="0.0" step="0.05"><br><br>
Attività <input id="act" type="number" value="0.3" step="0.1"><br><br>

BMI iniziale:
<select id="bmi0">
<option value="20">Atletico</option>
<option value="23" selected>Normopeso</option>
<option value="27">Sovrappeso</option>
<option value="33">Obeso</option>
</select>

<br><br>

<button onclick="run()">Simula</button>

</div>

<div class="panel">

<canvas id="chartBMI"></canvas>
<canvas id="chartTG"></canvas>
<canvas id="chartHDL"></canvas>
<canvas id="chartRISK"></canvas>

<div id="table"></div>

</div>

</div>

<script>

// ======================
// MAPPE DIETA
// ======================

const dietMap = {
"Mediterranea":[0.55,1.00],
"Occidentale":[0.75,1.08],
"Mediterranea low-fat":[0.65,0.95],
"Cheto moderata":[0.25,1.00],
"Cheto stretta":[0.15,0.98]
};

const compMap = {
"Animale":[-0.15,0.05],
"Mista":[0,0],
"Vegetale":[0.2,-0.05]
};

// ======================
// MODELLO
// ======================

function run(){

let diet = document.getElementById("diet").value;
let comp = document.getElementById("comp").value;

let R = dietMap[diet][0] + compMap[comp][0];
let Cal = dietMap[diet][1] + compMap[comp][1];

let act = +document.getElementById("act").value;

// ======================
// PARAMETRI
// ======================

const G0 = 120;

const alphaG = 60;
const betaG = 0.8;

const kup = 0.01;
const kdown = 0.005;

const aM = 0.015;
const bV = 0.01;
const cIR = 0.02;

const aV = 0.05;
const betaIR = 0.6;
const bVclear = 0.03;

const cTG = 0.04;
const dTG = 0.03;

const eHDL = 0.2;
const kIR = 1.0;
const kR = 0.4;
const fV = 0.05;
const gHDL = 0.03;

const gB = 0.035;

const rho = 0.97;

// ======================
// STATO
// ======================

let BMI = +document.getElementById("bmi0").value;

let IR = 0.2;
let M = 0;
let V = 1;
let TG = 120;
let HDL = 50;
let HDL0 = 50;
let Risk = 0;

let bmiArr=[], tgArr=[], hdlArr=[], riskArr=[];
let rows="";

// ======================
// LOOP
// ======================

for(let t=0;t<24;t++){

// ----------------------
// G(t) scostamento post-prandiale
// ----------------------
let G = G0 + alphaG * R * (1 + betaG * IR);

// ----------------------
// MEMORIA GLICEMICA
// ----------------------
let excess = Math.max(0, G - G0);
let deficit = Math.max(0, G0 - G);

M = M + kup * excess - kdown * deficit;

// ----------------------
// IR dinamico
// ----------------------
IR = IR + aM * M + bV * V - cIR * IR;
IR = Math.max(0.05, IR);

// ----------------------
// VLDL
// ----------------------
V = V + aV * R * (1 + betaIR * IR) - bVclear * V;

// ----------------------
// TRIGLICERIDI
// ----------------------
TG = TG + cTG * V - dTG * TG;

// ----------------------
// HDL
// ----------------------
HDL =
HDL
+ eHDL
+ kIR * (1/(1+IR))
+ kR * R
- fV * V
- gHDL * (HDL - HDL0);

// ----------------------
// BMI
// ----------------------
BMI = BMI + gB * (Cal - 1);

// ----------------------
// RISK
// ----------------------
Risk = rho * Risk + 0.04 * IR + 0.03 * (TG / HDL);

// ----------------------
// STORE
// ----------------------
bmiArr.push(BMI);
tgArr.push(TG);
hdlArr.push(HDL);
riskArr.push(Risk);

rows += `<tr>
<td>${t+1}</td>
<td>${BMI.toFixed(2)}</td>
<td>${TG.toFixed(0)}</td>
<td>${HDL.toFixed(1)}</td>
<td>${(TG/HDL).toFixed(2)}</td>
<td>${Risk.toFixed(2)}</td>
</tr>`;
}

// ======================
// TABLE
// ======================

document.getElementById("table").innerHTML =
`<table>
<tr><th>Mese</th><th>BMI</th><th>TG</th><th>HDL</th><th>TG/HDL</th><th>Risk</th></tr>
${rows}
</table>`;

// ======================
// CHARTS
// ======================

new Chart(document.getElementById("chartBMI"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"BMI",data:bmiArr}]}
});

new Chart(document.getElementById("chartTG"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"TG",data:tgArr}]}
});

new Chart(document.getElementById("chartHDL"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"HDL",data:hdlArr}]}
});

new Chart(document.getElementById("chartRISK"),{
type:"line",
data:{labels:[...Array(24).keys()].map(i=>"M"+(i+1)),
datasets:[{label:"Risk",data:riskArr}]}
});

}

</script>

</body>
</html>
